        function sanitizeMode(mode) {
            return mode === 'solo' ? 'solo' : 'coop';
        }

        function getModeMeta(mode) {
            const safeMode = sanitizeMode(mode);
            return safeMode === 'solo'

                    className: 'mode-chip is-solo',

                };
        }

        function sanitizeDate(dateValue) {
            if (typeof dateValue !== 'string') return '';
            return /^\d{4}-\d{2}-\d{2}$/.test(dateValue) ? dateValue : '';
        }

        function formatDisplayDate(dateValue) {
            const safeDate = sanitizeDate(dateValue);
            return safeDate ? safeDate.replace(/-/g, '/') : '';
        }

        function extractCastleNumber(castleName) {
            const match = String(castleName || '').match(/^(\d{1,3})/);
            return match ? match[1].padStart(3, '0') : '---';
        }

        function shuffleArray(items) {
            const clone = Array.isArray(items) ? items.slice() : [];
            for (let index = clone.length - 1; index > 0; index -= 1) {
                const swapIndex = Math.floor(Math.random() * (index + 1));
                [clone[index], clone[swapIndex]] = [clone[swapIndex], clone[index]];
            }
            return clone;
        }

        function getChronologicalCompletedEntries(savedData = loadProgressData()) {
            const datedGroups = new Map();
            const undatedEntries = [];
            const FIRST_LOCKED_CASTLE = '059 姬路城';

            ALL_CASTLES.forEach((castle) => {
                const entry = savedData[castle];
                if (!entry || !entry.checked) return;
                const safeDate = sanitizeDate(entry.date);
                const rawOrder = Number.parseInt(entry.dayOrder, 10);
                const item = {
                    castle,
                    castleNumber: extractCastleNumber(castle),
                    date: safeDate,
                    displayDate: formatDisplayDate(safeDate) || '—',
                    modeMeta: getModeMeta(entry.mode),
                    dayOrder: Number.isFinite(rawOrder) && rawOrder > 0 ? rawOrder : null
                };
                if (safeDate) {
                    if (!datedGroups.has(safeDate)) datedGroups.set(safeDate, []);
                    datedGroups.get(safeDate).push(item);
                } else {
                    undatedEntries.push(item);
                }
            });

            const ordered = [];
            const sortedDateKeys = Array.from(datedGroups.keys()).sort();
            sortedDateKeys.forEach((dateKey, dateIndex) => {
                const dayEntries = (datedGroups.get(dateKey) || []).slice().sort((a, b) => {
                    const aOrder = Number.isFinite(a.dayOrder) ? a.dayOrder : Number.MAX_SAFE_INTEGER;
                    const bOrder = Number.isFinite(b.dayOrder) ? b.dayOrder : Number.MAX_SAFE_INTEGER;
                    if (aOrder !== bOrder) return aOrder - bOrder;
                    if (dateIndex === 0) {
                        if (a.castle === FIRST_LOCKED_CASTLE && b.castle !== FIRST_LOCKED_CASTLE) return -1;
                        if (b.castle === FIRST_LOCKED_CASTLE && a.castle !== FIRST_LOCKED_CASTLE) return 1;
                    }
                    return a.castleNumber.localeCompare(b.castleNumber, 'zh-Hant');
                });
                ordered.push(...dayEntries);
            });

            undatedEntries.sort((a, b) => a.castleNumber.localeCompare(b.castleNumber, 'zh-Hant'));
            ordered.push(...undatedEntries);

            return ordered.map((item, index) => ({
                ...item,
                sequence: String(index + 1).padStart(3, '0')
            }));
        }

        function getSameDayCastles(savedData, dateValue) {
            const safeDate = sanitizeDate(dateValue);
            if (!safeDate) return [];
            return ALL_CASTLES.filter((castle) => {
                const entry = savedData[castle];
                return entry && entry.checked && sanitizeDate(entry.date) === safeDate;
            });
        }

        function syncDayOrdersForDate(savedData, dateValue) {
            const castles = getSameDayCastles(savedData, dateValue);
            if (!castles.length) return;
            const withOrder = [];
            const withoutOrder = [];
            castles.forEach((castle) => {
                const entry = savedData[castle];
                const order = Number.parseInt(entry?.dayOrder, 10);
                if (Number.isFinite(order) && order > 0) {
                    withOrder.push({ castle, order });
                } else {
                    withoutOrder.push(castle);
                }
            });
            withOrder.sort((a, b) => a.order - b.order || a.castle.localeCompare(b.castle, 'zh-Hant'));
            withoutOrder.sort((a, b) => a.localeCompare(b, 'zh-Hant'));
            [...withOrder.map(item => item.castle), ...withoutOrder].forEach((castle, index) => {
                if (savedData[castle]) savedData[castle].dayOrder = index + 1;
            });
        }

        function ensureDayOrders(savedData) {
            const seenDates = new Set();
            ALL_CASTLES.forEach((castle) => {
                const entry = savedData[castle];
                if (!entry || !entry.checked) return;
                const safeDate = sanitizeDate(entry.date);
                if (!safeDate) {
                    entry.dayOrder = null;
                    return;
                }
                if (seenDates.has(safeDate)) return;
                seenDates.add(safeDate);
                syncDayOrdersForDate(savedData, safeDate);
            });
            return savedData;
        }

        function assignDayOrderForCastle(savedData, castleId) {
            const entry = savedData[castleId];
            if (!entry || !entry.checked) return;
            const safeDate = sanitizeDate(entry.date);
            if (!safeDate) {
                entry.dayOrder = null;
                return;
            }
            const sameDayCastles = getSameDayCastles(savedData, safeDate).filter((castle) => castle !== castleId);
            const maxOrder = sameDayCastles.reduce((maxValue, castle) => {
                const order = Number.parseInt(savedData[castle]?.dayOrder, 10);
                return Number.isFinite(order) && order > maxValue ? order : maxValue;
            }, 0);
            entry.dayOrder = maxOrder + 1;
            syncDayOrdersForDate(savedData, safeDate);
        }

        function rotateDayOrder(castleId) {
            const savedData = loadProgressData();
            const entry = savedData[castleId];
            if (!entry) return;
            const safeDate = sanitizeDate(entry.date);
            if (!safeDate) return;
            const sameDayCastles = getSameDayCastles(savedData, safeDate);
            if (sameDayCastles.length < 2) return;
            syncDayOrdersForDate(savedData, safeDate);
            const currentOrder = Number.parseInt(savedData[castleId]?.dayOrder, 10) || 1;
            const nextOrder = currentOrder >= sameDayCastles.length ? 1 : currentOrder + 1;
            sameDayCastles.forEach((castle) => {
                if (castle === castleId) return;
                const otherOrder = Number.parseInt(savedData[castle]?.dayOrder, 10) || 1;
                if (nextOrder === 1) {
                    if (otherOrder < currentOrder) savedData[castle].dayOrder = otherOrder + 1;
                } else if (otherOrder === nextOrder) {
                    savedData[castle].dayOrder = currentOrder;
                }
            });
            savedData[castleId].dayOrder = nextOrder;
            syncDayOrdersForDate(savedData, safeDate);
            saveProgressData(savedData);
            renderChecklist();
        }

        function parseLocalDate(dateValue) {
            const safeDate = sanitizeDate(dateValue);
            if (!safeDate) return null;
            const [year, month, day] = safeDate.split('-').map(Number);
            const parsed = new Date(year, month - 1, day);
            return Number.isNaN(parsed.getTime()) ? null : parsed;
        }

        function getDurationDays(savedData = loadProgressData()) {
            const entries = Object.values(savedData).filter(entry => entry && entry.checked);
            const validDates = entries
                .map(entry => sanitizeDate(entry.date))
                .filter(Boolean)
                .sort();
            if (!validDates.length) return null;

            const startDate = parseLocalDate(validDates[0]);
            const endSource = entries.length === ALL_CASTLES.length ? validDates[validDates.length - 1] : (() => {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            })();
            const endDate = parseLocalDate(endSource);
            if (!startDate || !endDate) return null;

            const msPerDay = 24 * 60 * 60 * 1000;
            const dayCount = Math.floor((endDate - startDate) / msPerDay) + 1;
            return dayCount > 0 ? dayCount : 1;
        }

        function normalizeProgressData(rawData) {
            if (!rawData || typeof rawData !== 'object' || Array.isArray(rawData)) return {};
            const normalized = {};
            ALL_CASTLES.forEach((castle) => {
                const entry = rawData[castle];
                if (!entry || typeof entry !== 'object' || !entry.checked) return;
                const rawOrder = Number.parseInt(entry.dayOrder, 10);
                normalized[castle] = {
                    checked: true,
                    date: sanitizeDate(entry.date),
                    mode: sanitizeMode(entry.mode),
                    dayOrder: Number.isFinite(rawOrder) && rawOrder > 0 ? rawOrder : null
                };
            });
            return normalized;
        }

        function encodeBase64Utf8(text) {
            const bytes = new TextEncoder().encode(String(text));
            let binary = '';
            const chunkSize = 0x8000;
            for (let i = 0; i < bytes.length; i += chunkSize) {
                const chunk = bytes.subarray(i, i + chunkSize);
                binary += String.fromCharCode.apply(null, chunk);
            }
            return btoa(binary);
        }

        function toggleCastle(castleId) {
            const savedData = loadProgressData();
            const checkbox = document.getElementById(castleId);

            if (checkbox.checked) {
                const previous = savedData[castleId] || {};
                savedData[castleId] = {
                    checked: true,
                    date: sanitizeDate(previous.date) || getLocalIsoDate(),
                    mode: sanitizeMode(previous.mode),
                    dayOrder: Number.parseInt(previous.dayOrder, 10) > 0 ? Number.parseInt(previous.dayOrder, 10) : null
                };
                assignDayOrderForCastle(savedData, castleId);
            } else {
                const previousDate = sanitizeDate(savedData[castleId]?.date);
                delete savedData[castleId];
                if (previousDate) syncDayOrdersForDate(savedData, previousDate);
            }

            saveProgressData(savedData);
            renderChecklist();
        }

        function updateDate(castleId, dateValue) {
            const savedData = loadProgressData();
            if (!savedData[castleId]) return;
            const previousDate = sanitizeDate(savedData[castleId].date);
            const nextDate = sanitizeDate(dateValue);
            savedData[castleId].date = nextDate;
            if (previousDate && previousDate !== nextDate) {
                syncDayOrdersForDate(savedData, previousDate);
            }
            if (nextDate) {
                assignDayOrderForCastle(savedData, castleId);
            } else {
                savedData[castleId].dayOrder = null;
            }
            saveProgressData(savedData);
            renderChecklist();
        }

        function updateProgress() {
            const savedData = loadProgressData();
            let globalCount = 0;
            let soloCount = 0;
            let coopCount = 0;
            let dates = [];

            castleData.forEach(section => {
                const checked = section.castles.filter(c => {
                    if (savedData[c] && savedData[c].checked) {
                        if (savedData[c].date) dates.push(savedData[c].date);
                        if (savedData[c].mode === 'coop') coopCount++; else soloCount++;
                        return true;
                    }
                    return false;
                }).length;
                
                globalCount += checked;
                const el = document.getElementById(`count-${section.region}`);
                if (el) {
                    el.innerText = `${checked}/${section.castles.length}`;
                    const color = section.borderColor.split('-')[1];
                    if (checked === section.castles.length) {
                        el.className = `text-xs px-2 py-1 rounded-full font-mono bg-${color}-600 text-white`;
                    } else {
                        el.className = `text-xs px-2 py-1 rounded-full font-mono bg-${color}-50 text-${color}-600 border border-${color}-100`;
                    }
                }
            });

            soloCountEl.innerText = soloCount;
            coopCountEl.innerText = coopCount;

            const totalCastles = 100;
            const percent = Math.round((globalCount / totalCastles) * 100);
            progressBar.style.width = `${percent}%`;
            progressText.innerText = `${globalCount}/${totalCastles} (${percent}%)`;

            if (dates.length > 0) {
                dates.sort();
                startEl.innerText = dates[0].replace(/-/g, '/');
                if (globalCount === totalCastles) {
                    endEl.innerText = dates[dates.length - 1].replace(/-/g, '/');
                } else {
                    endEl.innerText = '________';
                }
            } else {
                startEl.innerText = '________';
                endEl.innerText = '________';
            }

            const durationDays = getDurationDays(savedData);
            durationEl.innerText = durationDays ? String(durationDays) : '——';
        }

                '.mode-badge-coop{background:#e8faf6;border-color:#bfece3;color:#0f766e;}',
                '.footer-note{margin-top:18px;padding-top:4px;font-size:11px;color:#8a94a3;text-align:right;letter-spacing:.04em;}',
                '.mon-svg{display:block;}',
                '@media (max-width: 760px){.hero-topline{grid-template-columns:1fr auto;grid-template-areas:"title crest" "meta meta" "label label";column-gap:12px;}.hero-crest{width:62px;height:62px;justify-self:end;margin-top:24px;}.hero-crest .mon-svg{width:46px;height:46px;}.document-title{font-size:27px;}.issue-meta{padding-top:22px;}.issue-meta,.hero-crest-label{justify-self:end;text-align:right;}.summary-board{grid-template-columns:repeat(2,minmax(0,1fr));grid-template-areas:"hero hero" "solo coop" "start end";}.summary-card--highlight{min-height:118px;}.section-head{padding:11px 12px;}.section-emblem{width:42px;height:42px;flex-basis:42px;}.section-emblem .mon-svg{width:28px;height:28px;}}',
                '@media print{body{background:#ffffff;}.page{max-width:none;padding:0;}.page::before{inset:0;}.page::after{inset:10px;}.hero,.section,.summary-card{box-shadow:none;}.hero{break-inside:avoid;page-break-inside:avoid;}.castle-list{grid-template-columns:repeat(2,minmax(0,1fr));}}'
            ].join('');

            return [
                '<!DOCTYPE html>','<html lang="zh-TW">','<head>','<meta charset="utf-8"/>','<meta name="viewport" content="width=device-width, initial-scale=1"/>',`<title>${escapeHtml(COMPLETED_TITLE)}_${getLocalIsoDate()}</title>`,`<style>${styles}</style>`,'</head>','<body>','<div class="page">','<section class="hero">',
                '<div class="hero-topline">',
                '<div class="hero-title-wrap">',
                '<div class="document-tag">戰報證書</div>',
                `<div class="document-title">${escapeHtml(COMPLETED_TITLE)}</div>`,
                '</div>',
                '<div class="hero-side">',
                `<div class="hero-crest-wrap"><div class="hero-crest">${getTokugawaMonSvg()}</div><div class="hero-crest-label">總紋・德川三葉葵</div></div>`,
                `<div class="issue-meta">輸出日期：${escapeHtml(today)}<br/>版本：${escapeHtml(APP_VERSION)}</div>`,
                '</div>',
                '</div>',
                '<div class="summary-board">',
                `<div class="summary-card summary-card--highlight"><div class="summary-label">制霸進度</div><div class="summary-value">${summary.doneCount}<span class="summary-value--small"> / 100</span></div><div class="summary-note">名城制霸城數</div></div>`,
                `<div class="summary-card summary-card--solo"><div class="summary-label">Solo</div><div class="summary-value">${summary.soloCount}</div></div>`,
                `<div class="summary-card summary-card--coop"><div class="summary-label">合作</div><div class="summary-value">${summary.coopCount}</div></div>`,
                `<div class="summary-card summary-card--start"><div class="summary-label">起始日</div><div class="summary-value summary-value--small">${escapeHtml(summary.startDate)}</div></div>`,
                `<div class="summary-card summary-card--end"><div class="summary-label">完成日</div><div class="summary-value summary-value--small">${escapeHtml(summary.endDate)}</div></div>`,
                '</div>',
                '</section>',
                sections.join(''),
                `<div class="footer-note">由 ${escapeHtml(EXPORT_TITLE)} 產生 ・ ${escapeHtml(COMPLETED_TITLE)}</div>`,
                '</div>','</body>','</html>'
            ].join('');
        }

        function exportCompletedList() {
            try {
                const savedData = loadProgressData();
                const hasAnyDone = Object.values(savedData).some(entry => entry && entry.checked);
                if (!hasAnyDone) {
                    alert('目前沒有任何已完成戰績可以匯出！');
                    return;
                }
                const content = buildCompletedExportHtml();
                const date = getLocalIsoDate();
                const filename = `${HTML_FILE_PREFIX}_${date}.html`;
                if (window.AndroidBridge && typeof window.AndroidBridge.exportFile === 'function') {
                    const base64 = encodeBase64Utf8(content);
                    window.AndroidBridge.exportFile(filename, 'text/html', base64);
                    pendingExportKind = 'html';
                    showFeedback('戰績 HTML 匯出中…');
                    return;
                }
                pendingExportKind = 'html';
                const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
                showFeedback('戰績 HTML 已匯出！');
                pendingExportKind = null;
            } catch (error) {
                console.error(error);
                alert('列出戰績失敗，請再試一次。');
            }
        }

        function printCompletedListPdf() {
            try {
                const savedData = loadProgressData();
                const hasAnyDone = Object.values(savedData).some(entry => entry && entry.checked);
                if (!hasAnyDone) {
                    alert('目前沒有任何已完成戰績可以列印！');
                    return;
                }
                const html = buildCompletedExportHtml();
                if (window.AndroidBridge && typeof window.AndroidBridge.printHtml === 'function') {
                    const base64 = encodeBase64Utf8(html);
                    window.AndroidBridge.printHtml(`${RECORD_PDF_JOB_PREFIX}_${getLocalIsoDate()}`, base64);
                    showFeedback('戰績 PDF 已開啟！');
                    return;
                }
                const printWindow = window.open('', '_blank', 'width=980,height=1280');
                if (!printWindow) {
                    alert('目前無法開啟戰績 PDF 功能。');
                    return;
                }
                printWindow.document.write(html);
                printWindow.document.close();
                printWindow.focus();
                setTimeout(() => printWindow.print(), 280);
            } catch (error) {
                console.error(error);
                alert('戰績 PDF 匯出失敗，請再試一次。');
            }
        }


        function printToPdf() {
            try {
                const savedData = loadProgressData();
                const hasAnyDone = Object.values(savedData).some(entry => entry && entry.checked);
                if (!hasAnyDone) {
                    alert('目前沒有任何已完成戰績可以列印！');
                    return;
                }
                const html = buildCompletedHtml();
                if (window.AndroidBridge && typeof window.AndroidBridge.printHtml === 'function') {
                    const base64 = encodeBase64Utf8(html);
                    window.AndroidBridge.printHtml(`${PDF_JOB_PREFIX}_${getLocalIsoDate()}`, base64);
                    showFeedback('戰報列印已開啟！');
                    return;
                }
                const printWindow = window.open('', '_blank', 'width=900,height=1200');
                if (!printWindow) {
                    alert('目前無法開啟戰報列印功能。');
                    return;
                }
                printWindow.document.write(html);
                printWindow.document.close();
                printWindow.focus();
                setTimeout(() => printWindow.print(), 250);
            } catch (error) {
                console.error(error);
                alert('戰報列印失敗，請再試一次。');
            }
        }

        function exportData() {
            const data = localStorage.getItem('castleProgress');
            if (!data || data === '{}') {
                alert('目前沒有任何制霸紀錄可以匯出！');
                return;
            }
            const date = getLocalIsoDate();
            const filename = `${BACKUP_FILE_PREFIX}_${date}.json`;

            if (window.AndroidBridge && typeof window.AndroidBridge.exportJson === 'function') {
                const base64 = encodeBase64Utf8(data);
                pendingExportKind = 'json';
                window.AndroidBridge.exportJson(filename, base64);
                return;
            }

            pendingExportKind = 'json';
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            showFeedback('備份 JSON 已匯出！');
            pendingExportKind = null;
        }

        function triggerImport() {
            if (window.AndroidBridge && typeof window.AndroidBridge.importJson === 'function') {
                window.AndroidBridge.importJson();
                return;
            }
            document.getElementById('importFile').click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                applyImportedData(e.target.result);
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function applyImportedData(rawText) {
            try {
                const data = JSON.parse(rawText);
                const normalized = normalizeProgressData(data);
                saveProgressData(normalized);
                renderChecklist();
                showFeedback('制霸紀錄已匯入！');
            } catch (err) {
                console.error(err);
                alert('匯入失敗：備份檔格式不正確');
            }
        }

        window.__androidImportData = function(rawText) {
            applyImportedData(rawText);
        };

        window.__androidExportFinished = function(success) {
            if (success) {
                if (pendingExportKind === 'html') {
                    showFeedback('戰績 HTML 已匯出！');
                } else if (pendingExportKind === 'json') {
                    showFeedback('備份 JSON 已匯出！');
                } else {
                    showFeedback('檔案已匯出！');
                }
            }
            pendingExportKind = null;
        };

        function resetChecklist() {
            openConfirmDialog('確定要清除所有紀錄與日期嗎？此動作無法復原。', () => {
                localStorage.removeItem('castleProgress');
                renderChecklist();
                showFeedback('紀錄已全數清空！', '🗑️');
            }, '清空紀錄');
        }

        window.onload = () => {
            saveProgressData(loadProgressData());
            renderChecklist();
        };
    </script>
